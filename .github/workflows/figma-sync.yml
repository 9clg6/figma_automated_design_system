name: Figma DS Sync

on:
  schedule:
    - cron: '0 2 * * *' # Nightly at 2am UTC
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run — detect drift only, no PR'
        type: boolean
        default: false
      force_generate:
        description: 'Force re-generate all unimplemented components'
        type: boolean
        default: false

permissions:
  contents: write
  pull-requests: write

env:
  NODE_VERSION: '20'
  KB_PATH: kb/registries

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Setup ──────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: npm ci

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.x'
          cache: true

      # ── 2. Discover new Figma components ──────────────────────
      - name: Discover new components
        id: discover
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          set +e
          OUTPUT=$(node scripts/discover-components.mjs 2>&1)
          EXIT_CODE=$?
          set -e
          echo "$OUTPUT"
          if [ $EXIT_CODE -ne 0 ]; then
            echo "::error::discover-components.mjs failed with exit code $EXIT_CODE"
            exit $EXIT_CODE
          fi
          NEW=$(echo "$OUTPUT" | grep "^NEW_COMPONENTS=" | cut -d= -f2)
          if [ -n "$NEW" ]; then
            echo "new_components=$NEW" >> "$GITHUB_OUTPUT"
            echo "has_new=true" >> "$GITHUB_OUTPUT"
            echo "::notice::New components discovered: $NEW"
          else
            echo "has_new=false" >> "$GITHUB_OUTPUT"
          fi

      # ── 3. Extract KB registries from Figma REST API ──────────
      - name: Extract Figma KB (registries)
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: node scripts/extract-figma.mjs

      # ── 4. Structural drift detection ─────────────────────────
      #    Compares live Figma component data against local specs.
      #    Ignores noise: key ordering, float precision, positions,
      #    timestamps, IDs. Only flags design-relevant changes.
      - name: Detect component drift
        id: drift
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          node scripts/detect-drift.mjs

          # Parse the machine-readable report
          REPORT="kb/sync-logs/drift-report.json"
          if [ ! -f "$REPORT" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No drift report generated."
            exit 0
          fi

          CHANGED_COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8')); console.log(r.stats.changed)")
          NEW_COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8')); console.log(r.stats.new)")
          CHANGED_LIST=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8')); console.log(r.changed.join(','))")
          SUMMARY=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8')); console.log(r.summary)")
          TOTAL=$(node -e "const r=JSON.parse(require('fs').readFileSync('$REPORT','utf8')); console.log(r.stats.total)")

          echo "changed_count=$CHANGED_COUNT" >> "$GITHUB_OUTPUT"
          echo "changed_list=$CHANGED_LIST" >> "$GITHUB_OUTPUT"
          echo "summary=$SUMMARY" >> "$GITHUB_OUTPUT"
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"

          if [ "$CHANGED_COUNT" -gt 0 ]; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Drift detected: $SUMMARY"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "::notice::No drift detected ($TOTAL components checked)."
          fi

      # ── 5. Guard: abort if too many components drifted ────────
      - name: Guard — drift size check
        if: steps.drift.outputs.changed == 'true'
        run: |
          MAX_CHANGED=15
          CHANGED="${{ steps.drift.outputs.changed_count }}"
          if [ "$CHANGED" -gt "$MAX_CHANGED" ]; then
            echo "::error::Too many components drifted ($CHANGED > $MAX_CHANGED). Likely a DS refactor — needs manual review."
            exit 1
          fi

      # ── 6. Generate new widgets ───────────────────────────────
      - name: Generate new widgets
        if: (steps.discover.outputs.has_new == 'true' || inputs.force_generate == true) && inputs.dry_run != true
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 15
        run: node scripts/generate-all-widgets.mjs

      # ── 7. Sync ONLY drifted components ─────────────────────────
      #    Uses the drift report to skip unchanged components.
      #    Saves Claude API tokens by not re-processing stable specs.
      - name: Sync drifted components
        if: steps.drift.outputs.changed == 'true' && inputs.dry_run != true
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        timeout-minutes: 10
        run: |
          CHANGED_LIST="${{ steps.drift.outputs.changed_list }}"
          if [ -z "$CHANGED_LIST" ]; then
            echo "No drifted components to sync."
            exit 0
          fi

          # Sync each drifted component
          # NOTE: do NOT run extract-figma-components before sync — it overwrites
          # the cached spec, making the diff see "no changes".
          IFS=',' read -ra COMPS <<< "$CHANGED_LIST"
          SYNCED=0
          for comp in "${COMPS[@]}"; do
            echo "━━━ Syncing $comp ━━━"
            if node scripts/sync-component.mjs --component "$comp" --skip-analyze; then
              SYNCED=$((SYNCED + 1))
            else
              echo "::warning::sync-component failed for $comp (continuing)"
            fi
          done
          echo "Synced $SYNCED/${#COMPS[@]} drifted components."

      # ── 7b. Update cached specs + reference images AFTER sync ──
      - name: Update Figma specs and reference images
        if: steps.drift.outputs.changed == 'true' && inputs.dry_run != true
        env:
          FIGMA_TOKEN: ${{ secrets.FIGMA_TOKEN }}
        run: |
          CHANGED_LIST="${{ steps.drift.outputs.changed_list }}"
          if [ -n "$CHANGED_LIST" ]; then
            node scripts/extract-figma-components.mjs --only "$CHANGED_LIST"
          fi

      # ── 8. Update widgetbook ──────────────────────────────────
      - name: Update widgetbook
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        run: node scripts/update-widgetbook.mjs

      # ── 9. Validate ──────────────────────────────────────────
      - name: Validate — Flutter analyze
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        run: |
          flutter pub get
          flutter analyze --no-fatal-warnings --no-fatal-infos lib/

      - name: Compliance check (deterministic)
        id: compliance
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        continue-on-error: true
        run: |
          node scripts/check-compliance-deterministic.mjs --json > kb/sync-logs/compliance-report.json 2>kb/sync-logs/compliance-stderr.log || true
          if [ -f kb/sync-logs/compliance-report.json ]; then
            AVG=$(node -e "const r=JSON.parse(require('fs').readFileSync('kb/sync-logs/compliance-report.json','utf8')); console.log(r.averageScore || 0)")
            BELOW=$(node -e "const r=JSON.parse(require('fs').readFileSync('kb/sync-logs/compliance-report.json','utf8')); const c=r.components||[]; console.log(c.filter(x=>x.score<30).length)")
            echo "average_score=$AVG" >> "$GITHUB_OUTPUT"
            echo "below_threshold=$BELOW" >> "$GITHUB_OUTPUT"
            echo "::notice::Compliance average: ${AVG}%, components below 30%: ${BELOW}"
          fi

      - name: Golden regression check
        id: golden_check
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        continue-on-error: true
        run: node scripts/check-golden-regressions.mjs

      - name: Read golden regression report
        id: golden_report
        if: steps.golden_check.outcome == 'failure'
        run: |
          if [ -f kb/sync-logs/golden-regressions.json ]; then
            COUNT=$(node -e "const r=JSON.parse(require('fs').readFileSync('kb/sync-logs/golden-regressions.json','utf8')); console.log(r.count)")
            FILES=$(node -e "const r=JSON.parse(require('fs').readFileSync('kb/sync-logs/golden-regressions.json','utf8')); console.log(r.files.join(', '))")
            echo "count=$COUNT" >> "$GITHUB_OUTPUT"
            echo "files=$FILES" >> "$GITHUB_OUTPUT"
            echo "::warning::Golden regressions detected ($COUNT files): $FILES"
          fi

      - name: Update golden references (scoped)
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        run: |
          # Build list of golden test files for drifted/new components only
          CHANGED_LIST="${{ steps.drift.outputs.changed_list }}"
          NEW_LIST="${{ steps.discover.outputs.new_components }}"
          ALL_SLUGS="${CHANGED_LIST:+$CHANGED_LIST}${NEW_LIST:+,$NEW_LIST}"
          ALL_SLUGS="${ALL_SLUGS#,}"

          if [ -z "$ALL_SLUGS" ]; then
            echo "No components to update goldens for."
            exit 0
          fi

          # Look up golden_test paths from component-map.json
          GOLDEN_FILES=$(node -e "
            const map = JSON.parse(require('fs').readFileSync('config/component-map.json','utf8'));
            const slugs = '${ALL_SLUGS}'.split(',');
            const files = slugs
              .map(s => map.components[s]?.golden_test)
              .filter(Boolean);
            if (files.length) console.log(files.join(' '));
          ")

          if [ -z "$GOLDEN_FILES" ]; then
            echo "No golden test files mapped for: $ALL_SLUGS"
            exit 0
          fi

          echo "Updating goldens for: $GOLDEN_FILES"
          flutter test $GOLDEN_FILES --update-goldens

      # ── 9b. Clean build artifacts before PR ─────────────────
      - name: Clean build artifacts
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        run: |
          rm -rf .dart_tool/ build/ .flutter-plugins .flutter-plugins-dependencies .packages
          git checkout -- pubspec.lock 2>/dev/null || true

      # ── 10. Open draft PR ────────────────────────────────────
      #    Uses a fixed branch name so peter-evans/create-pull-request
      #    updates the existing PR instead of creating a new one each night.
      - name: Create draft PR
        if: (steps.drift.outputs.changed == 'true' || steps.discover.outputs.has_new == 'true') && inputs.dry_run != true
        uses: peter-evans/create-pull-request@v6
        with:
          branch: figma-sync/auto
          commit-message: |
            chore(design-system): nightly Figma sync

            - Discovered: ${{ steps.discover.outputs.has_new == 'true' && steps.discover.outputs.new_components || 'none' }}
            - Drifted: ${{ steps.drift.outputs.changed_list || 'none' }}
            - Drift summary: ${{ steps.drift.outputs.summary || 'no drift' }}
          title: 'chore(design-system): nightly Figma sync'
          body: |
            ## Automated Figma Design System Sync

            **Run:** nightly cron / manual dispatch
            **Date:** ${{ github.event.repository.updated_at }}

            ### Drift detection (structural)
            | Metric | Value |
            |--------|-------|
            | Components checked | ${{ steps.drift.outputs.total || '0' }} |
            | Drifted | ${{ steps.drift.outputs.changed_count || '0' }} |
            | Drifted components | ${{ steps.drift.outputs.changed_list || 'none' }} |
            | New components | ${{ steps.discover.outputs.has_new == 'true' && steps.discover.outputs.new_components || 'none' }} |
            | Compliance score | ${{ steps.compliance.outputs.average_score || 'n/a' }}% avg (${{ steps.compliance.outputs.below_threshold || '0' }} below 30%) |
            | Golden regressions | ${{ steps.golden_check.outcome == 'failure' && format('{0} files: {1}', steps.golden_report.outputs.count, steps.golden_report.outputs.files) || 'none' }} |

            ### Cost optimization
            - Only **${{ steps.drift.outputs.changed_count || '0' }}** components processed (screenshots + Claude API)
            - **${{ steps.drift.outputs.total || '0' }}** total components checked via structural diff (Figma API only, no Claude)
            - Estimated Claude API savings: ~${{ steps.drift.outputs.total || '0' }} fewer sync-component calls skipped

            ### Pipeline steps
            - [x] Discover new Figma components
            - [x] Extract Figma knowledge base (registries)
            - [x] Structural drift detection (design-aware diff)
            - [x] Generate widgets for new components (Claude API)
            - [x] Sync drifted components only (Claude API)
            - [x] Update widgetbook
            - [x] Flutter analyze
            - [x] Compliance check (deterministic) — ${{ steps.compliance.outputs.average_score || 'n/a' }}% avg
            - [x] Golden regression check ${{ steps.golden_check.outcome == 'failure' && '— regressions detected' || '' }}
            - [x] Golden references updated

            ### Checklist
            - [ ] Review generated Dart code
            - [ ] Verify widgets match Figma intent
            - [ ] Merge when satisfied
          draft: true
          labels: |
            design-system
            automated
